openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: WordForge API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: wordforge
    description: Word formatting and notebook conversion
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /ai-suggest:
    post:
      operationId: aiSuggest
      tags: [wordforge]
      summary: Get AI formatting suggestion
      description: Returns a contextual formatting hint from Gemini
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiSuggestInput"
      responses:
        "200":
          description: AI suggestion text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSuggestion"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AiSuggestInput:
      type: object
      properties:
        trigger:
          type: string
          description: "What triggered the suggestion (e.g. 'header_focus', 'h1_large', 'dark_color', 'ipynb_large', 'double_spacing')"
        context:
          type: string
          description: "Additional context (e.g. current value or field name)"
      required:
        - trigger

    AiSuggestion:
      type: object
      properties:
        suggestion:
          type: string
          description: The hint text to show the user
      required:
        - suggestion
