kind = "web"
previewPath = "/"
title = "WordForge"
version = "1.0.0"
id = "artifacts/wordforge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26132

[services.development]
run = "pnpm --filter @workspace/wordforge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wordforge", "run", "build" ]
publicDir = "artifacts/wordforge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26132"
BASE_PATH = "/"
